name: TJFWeather Data Sync

on:
  schedule:
    - cron: '15 * * * *' # Runs at minute 15 of every hour
  workflow_dispatch: # Allows you to trigger it manually via a button

jobs:
  build-and-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 # Required for reading GRIB files

      - name: Install Python Packages
        run: |
          pip install -r requirements.txt

      - name: Run Weather Engine
        run: python build_cache.py

      - name: Commit and Push New Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add static/
          git commit -m "Automated Weather Data Sync" || echo "No changes to commit"
          git push
